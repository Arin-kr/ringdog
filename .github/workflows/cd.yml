name: cd

# PRD ci_cd_pipeline.triggers: push_main -> build, push ECR, deploy EKS
on:
  push:
    branches:
      - main

concurrency:
  # Never cancel an in-flight deploy - let it finish (or fail) before the next one starts.
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ap-northeast-2
  EKS_CLUSTER_NAME: ringdog-demo
  K8S_NAMESPACE: ringdog
  DD_CIVISIBILITY_ENABLED: "true"
  DD_API_KEY: ${{ secrets.DD_API_KEY }}

permissions:
  id-token: write
  contents: read

jobs:
  docker_build_push_ecr:
    name: Build & Push Docker Images to ECR
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [frontend, backend-api, chatbot-service, order-consumer]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ringdog-${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/ringdog-${{ matrix.service }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/ringdog-${{ matrix.service }}:latest

  helm_upgrade_eks:
    name: Deploy to EKS
    needs: docker_build_push_ecr
    runs-on: ubuntu-latest
    outputs:
      alb_hostname: ${{ steps.alb.outputs.hostname }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR (for registry hostname)
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Add Datadog Helm repo
        run: |
          helm repo add datadog https://helm.datadoghq.com
          helm repo update

      # Deferred until the app itself is done — enable by adding DD_API_KEY /
      # DD_APP_KEY as repository secrets (no other change needed).
      - name: Deploy / upgrade Datadog Agent
        if: ${{ env.DD_API_KEY != '' }}
        run: |
          helm upgrade --install datadog-agent datadog/datadog \
            -n ${{ env.K8S_NAMESPACE }} --create-namespace \
            -f deploy/helm/datadog-agent/values.yaml \
            --set datadog.apiKey=${{ secrets.DD_API_KEY }} \
            --set datadog.appKey=${{ secrets.DD_APP_KEY }}

      # All of these are recreated with new values every destroy/apply cycle
      # (this is a cost-gated demo env, torn down between sessions), so none
      # of it lives in GitHub Secrets — resolved here by fixed resource name
      # instead, using the AWS credentials already assumed above. AWS_ROLE_ARN
      # is the one value that can't be resolved this way (it's needed before
      # any AWS credentials exist), so it stays a GitHub Secret.
      - name: Resolve deploy-time config from AWS
        id: resolve
        run: |
          set -euo pipefail

          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

          BACKEND_API_IRSA_ARN="arn:aws:iam::${ACCOUNT_ID}:role/ringdog-demo-backend-api-irsa"
          CHATBOT_IRSA_ARN="arn:aws:iam::${ACCOUNT_ID}:role/ringdog-demo-chatbot-service-irsa"
          ORDER_CONSUMER_IRSA_ARN="arn:aws:iam::${ACCOUNT_ID}:role/ringdog-demo-order-consumer-irsa"
          ALB_CONTROLLER_IRSA_ARN="arn:aws:iam::${ACCOUNT_ID}:role/ringdog-demo-alb-controller-irsa"

          VPC_ID=$(aws eks describe-cluster --name ${{ env.EKS_CLUSTER_NAME }} --query 'cluster.resourcesVpcConfig.vpcId' --output text)

          DB_JSON=$(aws secretsmanager get-secret-value --secret-id ringdog-demo/rds/credentials --query SecretString --output text)
          DB_USER=$(jq -r .username <<<"$DB_JSON")
          DB_PASS=$(jq -r .password <<<"$DB_JSON")
          DB_HOST=$(jq -r .host <<<"$DB_JSON")
          DB_PORT=$(jq -r .port <<<"$DB_JSON")
          DB_NAME=$(jq -r .dbname <<<"$DB_JSON")
          DATABASE_URL="postgresql://${DB_USER}:${DB_PASS}@${DB_HOST}:${DB_PORT}/${DB_NAME}?schema=public"

          JWT_SECRET=$(aws secretsmanager get-secret-value --secret-id ringdog-demo/app/jwt-secret --query SecretString --output text)

          MSK_CLUSTER_ARN=$(aws kafka list-clusters-v2 --cluster-name-filter ringdog-demo --query 'ClusterInfoList[0].ClusterArn' --output text)
          KAFKA_BROKERS_RAW=$(aws kafka get-bootstrap-brokers --cluster-arn "$MSK_CLUSTER_ARN" --query BootstrapBrokerString --output text)
          # helm --set treats "," as a key/value separator, but MSK returns a
          # comma-separated broker list — escape commas so it's parsed as one value.
          KAFKA_BROKERS="${KAFKA_BROKERS_RAW//,/\\,}"

          OPENSEARCH_ENDPOINT=$(aws opensearch describe-domain --domain-name ringdog-products --query 'DomainStatus.Endpoint' --output text)
          if [ "$OPENSEARCH_ENDPOINT" = "None" ] || [ -z "$OPENSEARCH_ENDPOINT" ]; then
            OPENSEARCH_ENDPOINT=$(aws opensearch describe-domain --domain-name ringdog-products --query 'DomainStatus.Endpoints.vpc' --output text)
          fi

          # Mask before these can appear in any later log line.
          echo "::add-mask::${DB_PASS}"
          echo "::add-mask::${DATABASE_URL}"
          echo "::add-mask::${JWT_SECRET}"

          {
            echo "backend_api_irsa_arn=${BACKEND_API_IRSA_ARN}"
            echo "chatbot_irsa_arn=${CHATBOT_IRSA_ARN}"
            echo "order_consumer_irsa_arn=${ORDER_CONSUMER_IRSA_ARN}"
            echo "alb_controller_irsa_arn=${ALB_CONTROLLER_IRSA_ARN}"
            echo "vpc_id=${VPC_ID}"
            echo "database_url=${DATABASE_URL}"
            echo "jwt_secret=${JWT_SECRET}"
            echo "kafka_brokers=${KAFKA_BROKERS}"
            echo "opensearch_endpoint=${OPENSEARCH_ENDPOINT}"
          } >> "$GITHUB_OUTPUT"

      # RDS starts schema-less on every fresh `terraform apply` (this demo env
      # gets destroyed/recreated between sessions) — nothing else runs Prisma
      # migrations against it. Uses the backend-api image just pushed above,
      # since it's the one image with packages/db's migrations + prisma CLI
      # baked in. Seed is idempotent (skips once products already exist).
      - name: Run DB migrations and seed
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          DATABASE_URL: ${{ steps.resolve.outputs.database_url }}
        run: |
          # First deploy on a fresh cluster: the Helm install below is what
          # normally creates this namespace, but this step runs before it.
          kubectl create namespace ${{ env.K8S_NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n ${{ env.K8S_NAMESPACE }} run ringdog-db-migrate --rm -i --restart=Never \
            --image="${REGISTRY}/ringdog-backend-api:${IMAGE_TAG}" \
            --env="DATABASE_URL=${DATABASE_URL}" \
            --command -- sh -c "node_modules/.bin/prisma migrate deploy --schema packages/db/prisma/schema.prisma && node_modules/.bin/ts-node packages/db/prisma/seed.ts"

      # Cluster add-on, not a RingDog app — watches Ingress/Service resources
      # and provisions the actual ALB behind them. Idempotent `upgrade
      # --install`, safe to run every deploy. Must exist before the Ingress
      # below can get an address.
      - name: Install/upgrade AWS Load Balancer Controller
        env:
          ALB_CONTROLLER_IRSA_ARN: ${{ steps.resolve.outputs.alb_controller_irsa_arn }}
          VPC_ID: ${{ steps.resolve.outputs.vpc_id }}
        run: |
          helm repo add eks https://aws.github.io/eks-charts
          helm repo update
          helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
            -n kube-system \
            --set clusterName=${{ env.EKS_CLUSTER_NAME }} \
            --set region=${{ env.AWS_REGION }} \
            --set vpcId="${VPC_ID}" \
            --set serviceAccount.create=true \
            --set serviceAccount.name=aws-load-balancer-controller \
            --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"="${ALB_CONTROLLER_IRSA_ARN}"
          kubectl -n kube-system rollout status deployment/aws-load-balancer-controller --timeout=120s

      # First pass: deploy/update all app workloads + the Ingress. ALB-dependent
      # fields (CORS_ORIGIN, NEXT_PUBLIC_*_BASE_URL, ingress.host) are left
      # unset here — the ALB doesn't exist until the Ingress below creates it.
      - name: Deploy RingDog apps (Helm)
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          DATABASE_URL: ${{ steps.resolve.outputs.database_url }}
          JWT_SECRET: ${{ steps.resolve.outputs.jwt_secret }}
          KAFKA_BROKERS: ${{ steps.resolve.outputs.kafka_brokers }}
          OPENSEARCH_ENDPOINT: ${{ steps.resolve.outputs.opensearch_endpoint }}
          BACKEND_API_IRSA_ARN: ${{ steps.resolve.outputs.backend_api_irsa_arn }}
          CHATBOT_IRSA_ARN: ${{ steps.resolve.outputs.chatbot_irsa_arn }}
          ORDER_CONSUMER_IRSA_ARN: ${{ steps.resolve.outputs.order_consumer_irsa_arn }}
        run: |
          # The ALB controller (just installed/upgraded above) generates its
          # own webhook TLS cert on pod startup and patches the cluster's
          # ValidatingWebhookConfiguration with it slightly *after* the pod
          # reports Ready — landing an Ingress apply in that gap fails with
          # "x509: certificate signed by unknown authority". Transient and
          # self-resolving within a few seconds, so retry instead of chasing
          # a more precise readiness signal.
          for i in $(seq 1 5); do
            if helm upgrade --install ringdog deploy/helm/charts/ringdog \
              -n ${{ env.K8S_NAMESPACE }} --create-namespace \
              --set image.registry="${REGISTRY}" \
              --set image.tag="${IMAGE_TAG}" \
              --set secrets.databaseUrl="${DATABASE_URL}" \
              --set secrets.jwtSecret="${JWT_SECRET}" \
              --set backendApi.env.KAFKA_BROKERS="${KAFKA_BROKERS}" \
              --set orderConsumer.env.KAFKA_BROKERS="${KAFKA_BROKERS}" \
              --set backendApi.env.OPENSEARCH_NODE="https://${OPENSEARCH_ENDPOINT}" \
              --set backendApi.irsaRoleArn="${BACKEND_API_IRSA_ARN}" \
              --set chatbotService.irsaRoleArn="${CHATBOT_IRSA_ARN}" \
              --set orderConsumer.irsaRoleArn="${ORDER_CONSUMER_IRSA_ARN}"; then
              break
            fi
            if [ "$i" -eq 5 ]; then
              echo "::error::helm upgrade --install ringdog failed after 5 attempts"
              exit 1
            fi
            echo "helm upgrade failed (attempt $i/5), retrying in 15s..."
            sleep 15
          done

      - name: Wait for ALB hostname
        id: alb
        run: |
          set -euo pipefail
          HOSTNAME=""
          for i in $(seq 1 40); do
            HOSTNAME=$(kubectl -n ${{ env.K8S_NAMESPACE }} get ingress ringdog -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
            if [ -n "$HOSTNAME" ]; then
              break
            fi
            echo "ALB hostname not ready yet (attempt $i/40), waiting 15s..."
            sleep 15
          done
          if [ -z "$HOSTNAME" ]; then
            echo "::warning::ALB hostname didn't become available in time — CORS_ORIGIN/API base URLs stay unset until the next deploy re-runs this step."
          fi
          echo "hostname=${HOSTNAME}" >> "$GITHUB_OUTPUT"

      # Second pass: now that the ALB exists, point the frontend/backend/chatbot
      # at it. --reuse-values keeps everything set above (image tag, secrets,
      # Kafka/OpenSearch/IRSA) without restating it.
      - name: Update RingDog apps with ALB hostname
        if: ${{ steps.alb.outputs.hostname != '' }}
        env:
          ALB_HOSTNAME: ${{ steps.alb.outputs.hostname }}
        run: |
          helm upgrade --install ringdog deploy/helm/charts/ringdog \
            -n ${{ env.K8S_NAMESPACE }} --reuse-values \
            --set frontend.env.NEXT_PUBLIC_API_BASE_URL="https://${ALB_HOSTNAME}" \
            --set frontend.env.NEXT_PUBLIC_CHATBOT_API_BASE_URL="https://${ALB_HOSTNAME}" \
            --set backendApi.env.CORS_ORIGIN="https://${ALB_HOSTNAME}" \
            --set chatbotService.env.CORS_ORIGIN="https://${ALB_HOSTNAME}" \
            --set ingress.host="${ALB_HOSTNAME}"

      # NFR-OBS-003: correlate deploy events with APM error-rate spikes by posting a
      # deployment marker to the Datadog Events API.
      - name: Send Datadog deployment marker
        if: ${{ env.DD_API_KEY != '' }}
        env:
          DD_SITE: ${{ vars.DD_SITE || 'datadoghq.com' }}
        run: |
          curl -sf -X POST "https://api.${DD_SITE}/api/v1/events" \
            -H "Content-Type: application/json" \
            -H "DD-API-KEY: ${{ secrets.DD_API_KEY }}" \
            -d @- <<EOF
          {
            "title": "RingDog deploy to ${{ env.EKS_CLUSTER_NAME }}",
            "text": "Deployed commit ${{ github.sha }} by ${{ github.actor }} via GitHub Actions cd.yml",
            "tags": ["project:ringdog", "env:demo", "service:ringdog", "sha:${{ github.sha }}"],
            "alert_type": "info",
            "source_type_name": "github"
          }
          EOF

  smoke_test:
    name: Smoke Test
    needs: helm_upgrade_eks
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: In-cluster health checks
        run: |
          kubectl -n ${{ env.K8S_NAMESPACE }} run smoke-curl --rm -i --restart=Never \
            --image=curlimages/curl:8.5.0 --command -- sh -c \
            "curl -sf http://backend-api:4000/health && curl -sf http://chatbot-service:4001/health && curl -sf http://frontend:3000/"

      - name: ALB smoke test (when the ALB is provisioned)
        if: ${{ needs.helm_upgrade_eks.outputs.alb_hostname != '' }}
        env:
          ALB_HOSTNAME: ${{ needs.helm_upgrade_eks.outputs.alb_hostname }}
        run: |
          curl -sf "http://${ALB_HOSTNAME}/"
          curl -sf "http://${ALB_HOSTNAME}/api/products?limit=1"
