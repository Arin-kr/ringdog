{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "ringdog.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "ringdog.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - {{- if .Values.ingress.host }}
      host: {{ .Values.ingress.host | quote }}
      {{- end }}
      http:
        paths:
          - path: /api/chat
            pathType: Prefix
            backend:
              service:
                name: chatbot-service
                port:
                  number: {{ .Values.chatbotService.port }}
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-api
                port:
                  number: {{ .Values.backendApi.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: {{ .Values.frontend.port }}
{{- end }}
