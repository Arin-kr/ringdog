apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.chatbotService.serviceAccountName }}
  namespace: {{ .Values.namespace }}
  annotations:
    eks.amazonaws.com/role-arn: {{ .Values.chatbotService.irsaRoleArn | default "" | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot-service
  namespace: {{ .Values.namespace }}
  labels:
    app: chatbot-service
spec:
  replicas: {{ .Values.chatbotService.replicaCount }}
  selector:
    matchLabels:
      app: chatbot-service
  template:
    metadata:
      labels:
        app: chatbot-service
    spec:
      serviceAccountName: {{ .Values.chatbotService.serviceAccountName }}
      containers:
        - name: chatbot-service
          image: {{ include "ringdog.image" (dict "Values" .Values "repo" "ringdog-chatbot-service") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.chatbotService.port }}
          env:
            - name: CHATBOT_SERVICE_PORT
              value: {{ .Values.chatbotService.port | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ringdog-app-secrets
                  key: databaseUrl
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ringdog-app-secrets
                  key: jwtSecret
            - name: DD_SERVICE
              value: ringdog-chatbot-service
            - name: DD_AGENT_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            {{- range $key, $value := .Values.chatbotService.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.chatbotService.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: chatbot-service
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: chatbot-service
  ports:
    - port: {{ .Values.chatbotService.port }}
      targetPort: {{ .Values.chatbotService.port }}
