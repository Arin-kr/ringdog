apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.backendApi.serviceAccountName }}
  namespace: {{ .Values.namespace }}
  annotations:
    eks.amazonaws.com/role-arn: {{ .Values.backendApi.irsaRoleArn | default "" | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api
  namespace: {{ .Values.namespace }}
  labels:
    app: backend-api
spec:
  replicas: {{ .Values.backendApi.replicaCount }}
  selector:
    matchLabels:
      app: backend-api
  template:
    metadata:
      labels:
        app: backend-api
      annotations:
        ad.datadoghq.com/backend-api.logs: '[{"source":"nodejs","service":"ringdog-backend-api"}]'
    spec:
      serviceAccountName: {{ .Values.backendApi.serviceAccountName }}
      containers:
        - name: backend-api
          image: {{ include "ringdog.image" (dict "Values" .Values "repo" "ringdog-backend-api") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backendApi.port }}
          env:
            - name: BACKEND_API_PORT
              value: {{ .Values.backendApi.port | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ringdog-app-secrets
                  key: databaseUrl
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ringdog-app-secrets
                  key: jwtSecret
            - name: DD_ENV
              value: {{ .Values.datadog.env | quote }}
            - name: DD_SERVICE
              value: ringdog-backend-api
            - name: DD_AGENT_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: DD_DATA_STREAMS_ENABLED
              value: "true"
            - name: DD_TRACE_REMOVE_INTEGRATION_SERVICE_NAMES_ENABLED
              value: "true"
            {{- range $key, $value := .Values.backendApi.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.backendApi.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend-api
  namespace: {{ .Values.namespace }}
  annotations:
    # Kafka cluster monitoring cluster check (Datadog Kafka Consumer
    # integration, https://docs.datadoghq.com/integrations/kafka_consumer).
    # backend-api is the ringdog.orders producer, so it's a valid client to
    # host this on. Only ONE instance of this check must exist across the
    # whole deployment (it monitors the entire MSK cluster, not just this
    # pod) - don't copy this annotation onto order-consumer too.
    ad.datadoghq.com/service.checks: |-
      {{ dict "kafka_consumer" (dict
        "init_config" (dict "max_partition_contexts" 10000)
        "instances" (list (dict
          "kafka_connect_str" .Values.backendApi.env.KAFKA_BROKERS
          "tags" (list "kafka_cluster_name:ringdog-demo")
          "enable_cluster_monitoring" true
        ))
      ) | toJson }}
spec:
  selector:
    app: backend-api
  ports:
    - port: {{ .Values.backendApi.port }}
      targetPort: {{ .Values.backendApi.port }}
