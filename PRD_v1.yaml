meta:
  project_name: RingDog
  version: "1.2"
  document_type: PRD
  last_updated: "2026-07-06"
  owner: Product Team
  status: draft
  summary: >
    Datadog 풀스택 모니터링 시연을 목표로 하는 데모 이커머스 앱.
    사용자는 키링 상품을 탐색/검색/장바구니/주문할 수 있으며,
    사이트 내 고객 상담 챗봇으로 상품·주문 관련 질문을 할 수 있다.
    운영자는 Datadog RUM, APM, Logs, CI/CD Visibility, DSM, LLM Observability(Agent Observability),
    Security(ASM) 기능을 사용하여 서비스를 엔드투엔드로 모니터링한다.
    인프라·서버·데이터 계층은 전부 AWS 기반이며, CI/CD는 GitHub Actions(무료 티어)로 구성한다.

business_context:
  problem_statement: >
    단일 데모로 프론트엔드 사용자 경험, 백엔드 성능, 비동기 이벤트 처리,
    LLM 기반 챗봇 응답 품질, CI/CD 파이프라인 가시성, 인프라 상태, 보안 위협 탐지를
    한 번에 검증할 수 있는 샘플 애플리케이션이 필요하다.
  objectives:
    - 고객 플로우(상품 탐색 -> 검색 -> 장바구니 -> 주문) 완전 동작
    - 사이트 내 챗봇을 통한 상품 추천·주문 상태 안내 시연
    - Datadog에서 RUM -> APM -> DB/MSK -> Infra -> LLM 호출로 이어지는 트레이스 가시화
    - GitHub Actions 배포 파이프라인을 CI/CD Visibility로 추적·시연
    - 보안 이벤트(예: SQLi 시도) 탐지 및 알림 시연
  non_goals:
    - 실제 결제 게이트웨이 연동
    - 멀티테넌시, 다국어, 정교한 추천 알고리즘
    - 대규모 트래픽을 위한 프로덕션급 비용 최적화
    - 유료 CI/CD 플랫폼(Jenkins Cloud, CircleCI 유료 플랜 등) 도입

users:
  personas:
    - name: Shopper
      description: 키링 상품을 빠르게 검색하고 구매하려는 일반 사용자
      primary_needs:
        - 빠른 검색 응답
        - 간단한 로그인 및 주문
        - 챗봇을 통한 상품·배송 문의
        - 주문 결과 확인
    - name: Datadog Observer
      description: 데모 중 시스템 상태를 관찰하는 엔지니어/세일즈 엔지니어
      primary_needs:
        - 트랜잭션·LLM 호출 병목 지점 추적
        - CI/CD 파이프라인 실패·지연 원인 분석
        - 에러 및 보안 이벤트 실시간 확인
        - 장애 상황 재현 및 원인 분석

scope:
  in_scope:
  # 비즈니스 기능
    - 이메일/비밀번호 기반 회원가입 및 로그인(JWT)
    - 상품 목록 조회, 키워드 검색(Amazon OpenSearch)
    - 장바구니 담기/수정/삭제
    - 주문 생성(모의 결제: 쿠폰 적용 시 0원 처리)
    - 주문 이벤트(OrderPlaced) Amazon MSK 발행 및 소비
    - 사이트 내 고객 상담용 챗봇(상품 추천, 주문 상태 안내, FAQ 응답)
  # 인프라·배포 (전부 AWS)
    - AWS VPC/EKS/RDS/MSK/OpenSearch/ECR/ALB/Secrets Manager 기반 구성
    - Terraform 기반 IaC
    - GitHub Actions 기반 CI/CD(무료 티어 범위)
  # Datadog 관측성
    - Datadog RUM & Session Replay
    - Datadog APM & Logs & Error Tracking
    - Datadog CI/CD Visibility(GitHub Actions 파이프라인 연동)
    - Datadog DSM(Amazon MSK 이벤트 토폴로지)
    - Datadog LLM Observability(챗봇 LLM 호출 추적)
    - Datadog Application Security Management(ASM)
    - Datadog Infrastructure Monitoring(EKS/RDS/MSK 노드·컨테이너 메트릭)
  out_of_scope:
    - 실제 카드 결제/환불
    - 관리자 백오피스
    - 푸시 알림/이메일 발송 자동화
    - 유료 CI/CD SaaS 도입
    - AWS 외 클라우드·온프레미스 인프라

technology_stack:
  cloud_provider: AWS
  iac: Terraform
  ci_cd:
    platform: GitHub Actions
    rationale: >
      Public 저장소는 무료 무제한, Private 저장소는 Free 플랜 기준 월 2,000분 제공.
      Datadog CI Visibility와 GitHub Actions 네이티브 연동을 지원한다.
    pipeline_stages:
      - lint_and_unit_test
      - build_docker_image
      - push_to_ecr
      - terraform_plan_apply
      - deploy_to_eks
    datadog_integration:
      - DD_CIVISIBILITY_ENABLED=true
      - dd-trace-ci 또는 datadog-ci 라이브러리로 파이프라인 스팬 수집
  frontend:
    framework: Next.js (React)
    hosting: AWS EKS (ALB Ingress)
  backend:
    framework: Node.js (Express)
    hosting: AWS EKS
  database:
    engine: Amazon RDS for PostgreSQL
  message_queue:
    service: Amazon MSK (Managed Streaming for Apache Kafka)
  search:
    service: Amazon OpenSearch Service
  llm:
    service: Amazon Bedrock
    rationale: AWS 네이티브 LLM 서비스로 챗봇 추론 및 Datadog LLM Observability 연동
    model_example: anthropic.claude-3-haiku (데모 비용·지연 최적화)
  container_registry: Amazon ECR
  secrets: AWS Secrets Manager + Kubernetes External Secrets
  monitoring: Datadog (Agent on EKS via Helm)

system_architecture:
  infrastructure:
    cloud: AWS
    region: ap-northeast-2
    iac: Terraform
    runtime: Amazon EKS
    components:
      networking:
        - Amazon VPC (퍼블릭/프라이빗 서브넷 분리)
        - NAT Gateway
        - Application Load Balancer (ALB)
        - Route 53 (선택, 데모 도메인 연결 시 -> 도메인 연결 안함)
      compute:
        - EKS Managed Node Group (Cluster Autoscaler / HPA)
        - EKS Pod: frontend, backend-api, order-consumer, chatbot-service
      data:
        - Amazon RDS for PostgreSQL (프라이빗 서브넷)
        - Amazon MSK (프라이빗 서브넷)
        - Amazon OpenSearch Service (프라이빗 서브넷)
      supporting:
        - Amazon ECR (컨테이너 이미지)
        - AWS Secrets Manager (DB 자격증명, JWT 시크릿, Bedrock API 키)
        - Amazon CloudWatch (AWS 기본 로그, Datadog과 병행·선택적 포워딩)
    topology:
      - public_subnet:
          components:
            - ALB
            - NAT Gateway
      - private_subnet:
          components:
            - EKS Managed Node Group (autoscaling)
            - Amazon RDS PostgreSQL
            - Amazon MSK
            - Amazon OpenSearch Service
    security:
      principles:
        - 최소 권한 접근(least privilege) — IAM Role 기반 Pod 인증(IRSA)
        - 보안그룹 기반 서비스 간 접근 제어
        - RDS/MSK/OpenSearch/Bedrock API는 프라이빗 네트워크 또는 VPC Endpoint로 제한
        - ECR 이미지 스캔 활성화(기본 무료 스캔)
  application_components:
    frontend:
      framework: Next.js (React)
      deployment: EKS Deployment + ALB Ingress
      responsibilities:
        - 상품 탐색/검색 UI
        - 인증 상태 관리
        - 장바구니/주문 UI
        - 플로팅 챗봇 위젯 UI
      observability:
        - Datadog RUM
        - Session Replay
        - RUM-APM trace 연계(x-datadog-trace-id 헤더)
    backend_api:
      framework: Node.js (Express)
      deployment: EKS Deployment
      responsibilities:
        - 인증/인가 API
        - 상품/검색 API
        - 장바구니/주문 API
        - MSK OrderPlaced 이벤트 발행
      observability:
        - Datadog APM (dd-trace)
        - Structured Logs (JSON)
        - Error Tracking
    chatbot_service:
      framework: Node.js (Express) 또는 Python (FastAPI)
      deployment: EKS Deployment
      responsibilities:
        - 사용자 질의 수신 및 컨텍스트 구성(상품·주문 DB 조회)
        - Amazon Bedrock LLM 호출 및 응답 스트리밍
        - 대화 이력 세션 관리(Redis 없이 DB 또는 인메모리 — 데모 범위)
      observability:
        - Datadog LLM Observability (토큰 사용량, 지연, 프롬프트/응답 스팬)
        - APM trace와 LLM span 연계
    order_consumer:
      framework: Node.js
      deployment: EKS Deployment
      responsibilities:
        - MSK OrderPlaced 이벤트 소비
        - 주문 상태 비동기 업데이트(결제 완료 처리 시뮬레이션)
      observability:
        - Datadog DSM (Kafka producer/consumer span)
        - APM
    data:
      postgres:
        service: Amazon RDS PostgreSQL
        usage:
          - 사용자/상품/장바구니/주문/챗봇 대화 이력 저장
          - 초기 샘플 상품 데이터 시드(50+ 키링 SKU)
      msk:
        service: Amazon MSK
        usage:
          - OrderPlaced 이벤트 브로커
          - ProductUpdated 이벤트(검색 인덱스 동기화)
      opensearch:
        service: Amazon OpenSearch Service
        usage:
          - 상품 검색 인덱스
          - 검색 응답 최적화
      bedrock:
        service: Amazon Bedrock
        usage:
          - 챗봇 자연어 이해 및 응답 생성
  sync_strategy:
    initial_sync: >
      앱 초기 구동 시 PostgreSQL 상품 데이터를 읽어 OpenSearch 인덱스를 직접 구성하거나
      MSK ProductIndexed 이벤트를 통해 비동기 색인한다.
    incremental_sync: >
      상품 변경 시 ProductUpdated 이벤트를 MSK에 발행하고 컨슈머가 OpenSearch 인덱스를 갱신한다.
    failure_handling:
      - 컨슈머 재시도(지수 백오프)
      - DLQ 토픽 운영
      - 인덱싱 실패 Datadog 메트릭/알림 구성

functional_requirements:
  authentication:
    - id: FR-AUTH-001
      requirement: 사용자는 이메일/비밀번호로 회원가입할 수 있어야 한다.
      acceptance_criteria:
        - 유효하지 않은 이메일 형식은 거부된다.
        - 비밀번호는 최소 8자 이상이어야 한다.
    - id: FR-AUTH-002
      requirement: 사용자는 로그인 후 JWT를 발급받아 인증 상태를 유지해야 한다.
      acceptance_criteria:
        - 인증 실패 시 401을 반환한다.
        - 만료 토큰 사용 시 재인증이 필요하다.
  catalog_and_search:
    - id: FR-CAT-001
      requirement: 메인 페이지에서 전체 상품 목록을 조회할 수 있어야 한다.
      acceptance_criteria:
        - 페이지네이션 또는 무한 스크롤이 적용된다.
        - 기본 정렬(최신 또는 인기)이 적용된다.
    - id: FR-SEARCH-001
      requirement: 키워드 기반 상품 검색을 Amazon OpenSearch로 제공해야 한다.
      acceptance_criteria:
        - "가죽", "에어팟" 등 부분 키워드 검색이 동작한다.
        - 검색 응답 시간 p95가 300ms 이내여야 한다.
  cart_and_order:
    - id: FR-CART-001
      requirement: 로그인 사용자는 장바구니에 상품을 추가/변경/삭제할 수 있어야 한다.
      acceptance_criteria:
        - 비로그인 사용자의 변경 요청은 401을 반환한다.
    - id: FR-ORDER-001
      requirement: 결제 요청 시 주문 데이터가 Amazon RDS PostgreSQL에 저장되어야 한다.
      acceptance_criteria:
        - 주문/주문항목이 하나의 트랜잭션으로 저장된다.
    - id: FR-ORDER-002
      requirement: 주문 생성 직후 OrderPlaced 이벤트를 Amazon MSK에 발행해야 한다.
      acceptance_criteria:
        - 이벤트에는 event_id, order_id, user_id, amount, status, created_at이 포함된다.
        - 이벤트 발행 실패 시 재시도 또는 보상 로직이 동작한다.
    - id: FR-ORDER-003
      requirement: 유효한 데모 쿠폰(RINGDOG100) 적용 시 결제 금액을 0원으로 처리한다.
      acceptance_criteria:
        - 쿠폰 미입력 또는 무효 쿠폰은 정상 가격으로 계산된다.
        - 0원 결제도 주문 완료(PAID) 상태로 기록된다.
  chatbot:
    - id: FR-CHAT-001
      requirement: 모든 페이지에서 플로팅 챗봇 위젯을 통해 질문할 수 있어야 한다.
      acceptance_criteria:
        - 비로그인 사용자도 일반 FAQ·상품 문의가 가능하다.
        - 로그인 사용자는 "내 주문 상태" 등 개인화 질의가 가능하다.
    - id: FR-CHAT-002
      requirement: 챗봇은 Amazon Bedrock LLM을 호출하여 자연어 응답을 생성해야 한다.
      acceptance_criteria:
        - 상품명·태그 기반 추천 응답이 반환된다.
        - 주문 번호 또는 최근 주문 기준 상태 안내가 반환된다.
        - LLM 호출 실패 시 사용자 친화적 fallback 메시지를 표시한다.
    - id: FR-CHAT-003
      requirement: 챗봇 LLM 호출은 Datadog LLM Observability로 추적되어야 한다.
      acceptance_criteria:
        - 프롬프트, 응답, 토큰 수, 지연 시간이 LLM span으로 기록된다.
        - APM trace와 LLM span이 동일 trace_id로 연계된다.

non_functional_requirements:
  performance:
    - id: NFR-PERF-001
      metric: 상품 검색 API p95 latency
      target: "<= 300ms"
    - id: NFR-PERF-002
      metric: 주문 API p95 latency
      target: "<= 500ms"
    - id: NFR-PERF-003
      metric: 챗봇 첫 토큰 응답 시간(TTFT) p95
      target: "<= 2s"
  reliability:
    - id: NFR-REL-001
      metric: 주요 API 가용성
      target: ">= 99.5% (데모 환경 기준)"
    - id: NFR-REL-002
      metric: MSK 이벤트 유실률
      target: "< 0.1%"
  security:
    - id: NFR-SEC-001
      requirement: 비밀번호 bcrypt 해시 저장
    - id: NFR-SEC-002
      requirement: JWT 시크릿/DB 자격증명/Bedrock 권한은 AWS Secrets Manager로 관리
    - id: NFR-SEC-003
      requirement: 입력값 검증 및 SQLi/XSS 방어(Express validator + ORM parameterized query)
    - id: NFR-SEC-004
      requirement: EKS Pod는 IRSA로 AWS 리소스에 최소 권한 접근
  observability:
    - id: NFR-OBS-001
      requirement: FE RUM trace_id와 BE APM trace_id 연계 추적 가능
    - id: NFR-OBS-002
      requirement: 주문 실패율, 검색 지연, MSK 적체, LLM 오류율에 대한 Datadog 모니터/알림 구성
    - id: NFR-OBS-003
      requirement: GitHub Actions 파이프라인 실행이 Datadog CI Visibility에 스팬으로 기록
    - id: NFR-OBS-004
      requirement: EKS 노드·Pod·RDS·MSK 메트릭이 Datadog Infrastructure Monitoring에 수집

datadog_observability_matrix:
  rum:
    product: Real User Monitoring
    integration: "@datadog/browser-rum" SDK in Next.js
    demo_points:
      - 결제 버튼 클릭 후 지연 구간 Session Replay 확인
      - 챗봇 위젯 열기·메시지 전송 사용자 행동 추적
      - 의도적 프론트엔드 에러 발생 시 RUM Error 이벤트 확인
  apm:
    product: Application Performance Monitoring
    integration: dd-trace (Node.js auto-instrumentation)
    demo_points:
      - 주문 API DB lock 대기 Flame Graph 확인
      - OpenSearch 쿼리 지연 스팬 식별
      - 챗봇 API -> Bedrock 호출 체인 추적
  logs:
    product: Log Management
    integration: Datadog Agent log collection (JSON structured logs)
    demo_points:
      - 주문 실패·챗봇 오류 로그를 trace_id로 APM과 연계 검색
  ci_cd_visibility:
    product: CI/CD Visibility
    integration: GitHub Actions + datadog-ci / DD_CIVISIBILITY_ENABLED
    demo_points:
      - PR 빌드·테스트·ECR 푸시·EKS 배포 파이프라인 타임라인 확인
      - 실패한 테스트 스텝을 스팬 단위로 원인 분석
      - 배포 후 APM 에러율 상승과 배포 이벤트 상관관계 확인
  dsm:
    product: Data Streams Monitoring
    integration: dd-trace Kafka instrumentation on MSK
    demo_points:
      - OrderPlaced 이벤트 생산/소비 지연 및 파티션 적체 토폴로지 시각화
  llm_observability:
    product: LLM Observability (Agent Observability)
    integration: ddtrace LLM integration or OpenTelemetry LLM spans
    demo_points:
      - 챗봇 프롬프트·응답·토큰 사용량·지연 대시보드 확인
      - 환각(hallucination) 또는 고지연 응답 케이스 식별
  asm:
    product: Application Security Management
    integration: Datadog ASM on Express + ALB
    demo_points:
      - 로그인·검색·챗봇 입력에 SQLi 공격 문자열 주입 시 탐지·차단 이벤트 확인
  infrastructure:
    product: Infrastructure Monitoring
    integration: Datadog Agent DaemonSet on EKS + AWS integration
    demo_points:
      - EKS 노드 CPU/메모리, RDS 연결 수, MSK 브로커 메트릭 대시보드 확인

ci_cd_pipeline:
  platform: GitHub Actions
  cost_policy: Free tier 범위 내 운영 (Public repo 무제한 / Private repo 월 2,000분)
  triggers:
    - pull_request: lint, unit test, terraform plan
    - push_main: build, push ECR, deploy EKS
  workflows:
    - name: ci
      jobs:
        - lint (eslint, prettier)
        - unit_test (jest)
        - integration_test (testcontainers 또는 mock)
        - terraform_plan
      datadog: CI Visibility span per job
    - name: cd
      jobs:
        - docker_build_push_ecr
        - helm_upgrade_eks
        - smoke_test
      datadog: deployment marker + pipeline trace
  aws_resources_used:
    - Amazon ECR (이미지 저장)
    - Amazon EKS (배포 대상)
    - AWS IAM OIDC (GitHub Actions → AWS 인증, 장기 Access Key 미사용)
  secrets_management:
    - GitHub Secrets: DD_API_KEY, DD_APP_KEY, AWS_ROLE_ARN
    - AWS Secrets Manager: 애플리케이션 런타임 시크릿

api_contracts:
  auth:
    - name: 회원가입
      method: POST
      path: /api/auth/signup
      auth_required: false
      body: { email, password }
    - name: 로그인
      method: POST
      path: /api/auth/login
      auth_required: false
      body: { email, password }
      response: { token, expires_in }
  catalog:
    - name: 상품 목록
      method: GET
      path: /api/products
      auth_required: false
      query: { page, limit, sort }
    - name: 상품 상세
      method: GET
      path: /api/products/:id
      auth_required: false
    - name: 상품 검색
      method: GET
      path: /api/products/search
      auth_required: false
      query: { q, page, limit }
  cart:
    - name: 장바구니 조회
      method: GET
      path: /api/cart
      auth_required: true
    - name: 장바구니 추가
      method: POST
      path: /api/cart/items
      auth_required: true
      body: { product_id, quantity }
    - name: 장바구니 항목 삭제
      method: DELETE
      path: /api/cart/items/:id
      auth_required: true
  order:
    - name: 주문 생성
      method: POST
      path: /api/orders/checkout
      auth_required: true
      body: { coupon_code }
      response: { order_id, status, total_amount }
    - name: 주문 목록
      method: GET
      path: /api/orders
      auth_required: true
    - name: 주문 상세
      method: GET
      path: /api/orders/:id
      auth_required: true
  chatbot:
    - name: 챗봇 메시지 전송
      method: POST
      path: /api/chat/messages
      auth_required: false
      body: { session_id, message }
      response: { reply, session_id }
      notes: 로그인 시 JWT 헤더로 user_id 컨텍스트 주입
    - name: 챗봇 대화 이력
      method: GET
      path: /api/chat/sessions/:session_id
      auth_required: false

data_model:
  entities:
    user:
      fields: [id, email, password_hash, role, created_at]
    product:
      fields: [id, name, description, price, stock, tags, image_url, created_at]
    cart_item:
      fields: [id, user_id, product_id, quantity, created_at]
    order:
      fields: [id, user_id, total_amount, coupon_code, status, created_at]
      status_enum: [PENDING, PAID, SHIPPED, CANCELLED]
    order_item:
      fields: [id, order_id, product_id, quantity, unit_price]
    chat_session:
      fields: [id, user_id, created_at, updated_at]
    chat_message:
      fields: [id, session_id, role, content, tokens_used, created_at]
      role_enum: [user, assistant]
  events:
    OrderPlaced:
      topic: ringdog.orders
      schema: [event_id, order_id, user_id, amount, status, created_at]
    ProductUpdated:
      topic: ringdog.catalog
      schema: [event_id, product_id, action, payload, created_at]

delivery_plan:
  milestones:
    M1:
      name: AWS 인프라/IaC 기반 구성
      deliverables:
        - Terraform: VPC, EKS, RDS, MSK, OpenSearch, ECR, ALB, IAM/IRSA
        - Datadog Agent Helm 배포 (EKS)
        - GitHub Actions OIDC → AWS IAM Role 연동
    M2:
      name: 코어 이커머스 기능 구현
      deliverables:
        - 인증/상품/검색/장바구니/주문 API (Express)
        - Next.js 사용자 플로우 (목록·검색·장바구니·결제)
        - MSK OrderPlaced 컨슈머
        - GitHub Actions CI 파이프라인 (lint, test, build, ECR push)
    M3:
      name: 챗봇 및 LLM Observability
      deliverables:
        - Amazon Bedrock 연동 챗봇 서비스
        - 플로팅 챗봇 UI
        - Datadog LLM Observability 대시보드
    M4:
      name: 관측성·보안·CI/CD 시연 고도화
      deliverables:
        - RUM/APM/Logs/DSM/ASM/Infrastructure 대시보드 및 모니터
        - GitHub Actions CD 파이프라인 + CI/CD Visibility 연동
        - 장애·공격·배포 실패 재현 시나리오 문서화
  release_criteria:
    - 핵심 사용자 시나리오 E2E 테스트 통과 (주문 + 챗봇)
    - NFR 핵심 지표 충족
    - Datadog 7개 제품군(RUM, APM, Logs, CI/CD, DSM, LLM, ASM) 데모 재현 가능
    - GitHub Actions 파이프라인이 Free tier 내에서 정상 동작

testing_strategy:
  unit_tests:
    - 인증 로직, 주문 금액 계산, 쿠폰 검증
    - 챗봇 프롬프트 빌더, 컨텍스트 조립 로직
  integration_tests:
    - API-RDS 트랜잭션
    - API-MSK 이벤트 발행/소비
    - OpenSearch 색인·검색 파이프라인
    - Bedrock LLM 호출(mock 또는 sandbox)
  e2e_tests:
    - 로그인 -> 검색 -> 장바구니 -> 쿠폰 결제 완료
    - 챗봇 상품 추천 -> 주문 상태 문의
  ci_tests:
  # GitHub Actions에서 실행
    - PR 시 lint + unit + integration
    - main merge 시 smoke test against EKS staging
  chaos_or_failure_tests:
    - OpenSearch 지연 시 timeout/fallback 동작
    - MSK 소비 지연 시 Datadog 알림 발생
    - Bedrock 호출 실패 시 챗봇 fallback 메시지
    - CI 파이프라인 의도적 실패 시 CI Visibility 스팬 확인

risks_and_mitigations:
  - risk: OpenSearch 인덱스 동기화 지연으로 검색 결과 불일치
    mitigation: 주기적 재색인 배치 + DLQ/재처리 워커 + Datadog 인덱싱 지연 알림
  - risk: Amazon Bedrock 호출 비용·지연 증가
    mitigation: Claude Haiku 등 경량 모델 사용, 응답 토큰 상한, 캐시된 FAQ 응답
  - risk: GitHub Actions Free tier 분 초과
    mitigation: Public repo 사용 또는 워크플로우 최적화(캐시, 병렬 제한, 불필요 job 제거)
  - risk: 데모 중 트래픽 급증으로 응답 지연
    mitigation: HPA 설정 + 데모 데이터 규모 제한 + ALB health check
  - risk: 보안 데모 오탐/미탐
    mitigation: 사전 공격 패턴 리허설 및 ASM 룰 튜닝
